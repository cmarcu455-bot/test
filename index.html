<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <title>Apartment Sales Manager</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, rgba(9, 13, 22, 1) 90%);
        }
        
        .portal-container {
            max-width: 540px;
            width: 100%;
            padding: 40px;
            text-align: center;
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }

        .portal-header {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .toggle-btn:hover {
            background: rgba(148, 163, 184, 0.2);
        }
        
        .logo-icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
            filter: drop-shadow(0 8px 16px rgba(99, 102, 241, 0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f8fafc 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        :root[data-theme="light"] h1 {
            background: linear-gradient(135deg, #0f172a 30%, #4f46e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 15px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .button-group a {
            text-decoration: none;
            width: 100%;
        }
        
        .features-box {
            text-align: left;
            background: rgba(148, 163, 184, 0.05);
            border: 1px solid var(--card-border);
            padding: 24px;
            border-radius: var(--radius-md);
            margin-top: 24px;
        }
        
        .features-box h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: hsl(var(--primary-light));
            margin-bottom: 16px;
            text-align: center;
        }

        :root[data-theme="light"] .features-box h3 {
            color: hsl(var(--primary));
        }
        
        .features-box ul {
            list-style: none;
            display: grid;
            gap: 10px;
        }
        
        .features-box li {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .features-box li:before {
            content: "✓";
            color: hsl(var(--success));
            font-weight: 800;
        }
        
        .info-note {
            background: rgba(6, 182, 212, 0.08);
            border-left: 3px solid hsl(var(--info));
            padding: 14px 18px;
            margin-top: 24px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: left;
        }

        .info-note code {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            color: hsl(var(--info));
        }
        
        @media (max-width: 600px) {
            .portal-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="portal-container glass-panel">
        <div class="portal-header">
            <button class="toggle-btn" id="langToggle" onclick="toggleLang()">RO</button>
            <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()">☀️</button>
        </div>

        <div class="logo-icon">🏢</div>
        <h1 id="title">Apartment Sales Manager</h1>
        <p class="subtitle" id="subtitle">Manage, approve, and generate contracts for apartment sales</p>
        
        <div class="button-group">
            <a href="app.html"><button class="primary" style="width: 100%; padding: 14px;" id="btnStart">🚀 Start Application</button></a>
            <a href="SETUP_GUIDE.md" style="margin-top: 4px;"><button class="secondary" style="width: 100%; padding: 12px;" id="btnSetup">📖 Read Setup Guide</button></a>
            <a href="PROJECT_SUMMARY.md"><button class="secondary" style="width: 100%; padding: 12px;" id="btnSummary">📋 Project Summary</button></a>
        </div>
        
        <div class="features-box">
            <h3 id="featuresTitle">Key Features</h3>
            <ul id="featuresList">
                <!-- Features inserted dynamically -->
            </ul>
        </div>
        
        <div class="info-note" id="infoNote">
            💡 <strong>Local:</strong> <code>npm run serve</code> then open the URL shown.<br>
            <strong>GitHub Pages:</strong> after deploy, use <code>https://YOUR-USERNAME.github.io/test/app.html</code> — see <strong>DEPLOY.md</strong>.
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Apartment Sales Manager",
                subtitle: "Manage, approve, and generate contracts for apartment sales",
                start: "🚀 Start Application",
                setup: "📖 Read Setup Guide",
                summary: "📋 Project Summary",
                features: "Key Features",
                info: "💡 <strong>Local:</strong> <code>npm run serve</code> then open the URL shown.<br><strong>GitHub Pages:</strong> after deploy, use <code>https://YOUR-USERNAME.github.io/test/app.html</code> — see <strong>DEPLOY.md</strong>.",
                list: [
                    "Search buyers by name or apartment number",
                    "Approve/Reject applications with notes",
                    "Generate PDF contracts automatically",
                    "Works 100% offline on tablets",
                    "Import/Export Excel files",
                    "Track approval status",
                    "Professional PDF generation",
                    "Mobile-optimized interface"
                ]
            },
            ro: {
                title: "Manager Vânzări Apartamente",
                subtitle: "Administrează, aprobă și generează contracte pentru vânzările de apartamente",
                start: "🚀 Pornește Aplicația",
                setup: "📖 Ghid de Configurare",
                summary: "📋 Rezumat Proiect",
                features: "Funcționalități Cheie",
                info: "💡 <strong>Local:</strong> <code>npm run serve</code> apoi deschideți URL-ul afișat.<br><strong>GitHub Pages:</strong> după deploy, accesați <code>https://YOUR-USERNAME.github.io/test/app.html</code> — vezi <strong>DEPLOY.md</strong>.",
                list: [
                    "Căutare cumpărători după nume sau număr apartament",
                    "Aprobare/Respingere cereri cu note detaliate",
                    "Generare contracte PDF în mod automat",
                    "Funcționează 100% offline pe tablete",
                    "Import/Export de fișiere Excel",
                    "Urmărire status pentru aprobare",
                    "Generare PDF aspect profesional",
                    "Interfață optimizată complet pentru mobil"
                ]
            }
        };

        let currentLang = localStorage.getItem('appLanguage') || 'en';
        let currentTheme = localStorage.getItem('appTheme') || 'dark';

        function updateUI() {
            const data = translations[currentLang];
            document.getElementById('title').textContent = data.title;
            document.getElementById('subtitle').textContent = data.subtitle;
            document.getElementById('btnStart').textContent = data.start;
            document.getElementById('btnSetup').textContent = data.setup;
            document.getElementById('btnSummary').textContent = data.summary;
            document.getElementById('featuresTitle').textContent = data.features;
            document.getElementById('infoNote').innerHTML = data.info;
            document.getElementById('langToggle').textContent = currentLang === 'en' ? 'RO' : 'EN';
            
            const listContainer = document.getElementById('featuresList');
            listContainer.innerHTML = data.list.map(f => `<li>${f}</li>`).join('');
            
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ro' : 'en';
            localStorage.setItem('appLanguage', currentLang);
            updateUI();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('appTheme', currentTheme);
            updateUI();
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
